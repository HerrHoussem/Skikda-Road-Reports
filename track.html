<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تتبع البلاغ</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    font-family:Cairo,sans-serif;
    background:#f5f5f5;
    padding:30px;
}

.container{
    max-width:700px;
    margin:auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
}

.status-new{
    color:orange;
    font-weight:bold;
}

.status-inprogress{
    color:blue;
    font-weight:bold;
}

.status-resolved{
    color:green;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<div class="card">

<h2>تتبع حالة البلاغ</h2>

<div id="result">
جاري البحث...
</div>

</div>

</div>

<script>

const SUPABASE_URL =
'https://xhgjmqyjbtnbdxvronhs.supabase.co';

const SUPABASE_KEY =
'sb_publishable_QBNv1eSIBsuzfu5j_eaRVA_UC3vF6KH';

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

const params =
new URLSearchParams(window.location.search);

const reportId =
params.get('reportId');

async function loadReport() {

if(!reportId){

document.getElementById('result').innerHTML =
'رقم البلاغ غير موجود';

return;
}

const { data, error } =
await supabaseClient
.from('reports')
.select('*')
.eq('report_id', reportId)
.single();

if(error || !data){

document.getElementById('result').innerHTML =
'لم يتم العثور على البلاغ';

return;
}

document.getElementById('result').innerHTML = `
<p><strong>رقم البلاغ:</strong> ${data.report_id}</p>
<p><strong>نوع المشكلة:</strong> ${data.issue_type}</p>
<p><strong>الموقع:</strong> ${data.location}</p>
<p><strong>الوصف:</strong> ${data.description}</p>
<p><strong>الحالة:</strong> ${data.status}</p>
`;

}

loadReport();

</script>

</body>
</html>
