<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تتبع حالة البلاغ</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            font-family: "Cairo", sans-serif;
            margin: 0;
            min-height: 100vh;
            background:
                linear-gradient(rgba(0, 51, 102, 0.65), rgba(0, 51, 102, 0.65)),
                url("skikda-banner.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
        }

        h2 {
            text-align: center;
            color: #003366;
            margin-bottom: 30px;
        }

        p {
            font-size: 20px;
            margin: 15px 0;
        }

        .status-new {
            background: #FFF3CD;
            color: #B45309;
            padding: 8px 15px;
            border-radius: 30px;
            font-weight: bold;
        }

        .status-progress {
            background: #DBEAFE;
            color: #1D4ED8;
            padding: 8px 15px;
            border-radius: 30px;
            font-weight: bold;
        }

        .status-resolved {
            background: #DCFCE7;
            color: #166534;
            padding: 8px 15px;
            border-radius: 30px;
            font-weight: bold;
        }

        .timeline {
            margin-top: 40px;
            display: flex;
            justify-content: space-between;
            text-align: center;
        }

        .step {
            flex: 1;
            padding: 10px;
        }

        .completed {
            color: #22c55e;
            font-weight: bold;
        }

        .pending {
            color: #999;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card">
            <h2>📋 تتبع حالة البلاغ</h2>

            <div id="result">
                جاري البحث...
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xhgjmqyjbtnbdxvronhs.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_QBNv1eSIBsuzfu5j_eaRVA_UC3vF6KH';

        const supabaseClient = supabase.createClient(
            SUPABASE_URL,
            SUPABASE_KEY
        );

        const params = new URLSearchParams(window.location.search);
        const reportId = params.get("reportId");

        async function loadReport() {

            if (!reportId) {
                document.getElementById("result").innerHTML =
                    "<p>❌ رقم البلاغ غير موجود.</p>";
                return;
            }

            const { data, error } = await supabaseClient
                .from("reports")
                .select("*")
                .eq("report_id", reportId)
                .single();

            if (error || !data) {
                document.getElementById("result").innerHTML =
                    "<p>❌ لم يتم العثور على البلاغ.</p>";
                return;
            }

            let statusClass = "status-new";

            if (data.status === "inprogress")
                statusClass = "status-progress";

            if (data.status === "resolved")
                statusClass = "status-resolved";

            document.getElementById("result").innerHTML = `
                <p><strong>رقم البلاغ:</strong> ${data.report_id}</p>

                <p><strong>نوع المشكلة:</strong> ${data.issue_type}</p>

                <p><strong>الموقع:</strong> ${data.location}</p>

                <p><strong>الوصف:</strong> ${data.description}</p>

                <p>
                    <strong>الحالة:</strong>
                    <span class="${statusClass}">
                        ${data.status}
                    </span>
                </p>

                <div class="timeline">

                    <div class="step ${["new","inprogress","resolved"].includes(data.status) ? "completed" : "pending"}">
                        📝 استلام البلاغ
                    </div>

                    <div class="step ${["inprogress","resolved"].includes(data.status) ? "completed" : "pending"}">
                        🔧 قيد المعالجة
                    </div>

                    <div class="step ${data.status === "resolved" ? "completed" : "pending"}">
                        ✅ تم الحل
                    </div>

                </div>
            `;
        }

        loadReport();
    </script>

</body>

</html>
