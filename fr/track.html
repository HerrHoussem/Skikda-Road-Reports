<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suivi du signalement - Skikda</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Cairo',sans-serif;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      background: linear-gradient(rgba(0,43,91,.75),rgba(0,43,91,.75)), url('../skikda-banner.jpg');
      background-size:cover;
      background-position:center;
      background-attachment:fixed;
    }
    .container { width:100%; max-width:850px; }
    .card { background:rgba(255,255,255,.92); backdrop-filter:blur(12px); border-radius:25px; padding:40px; box-shadow:0 20px 50px rgba(0,0,0,.25); }
    h1 { text-align:center; color:#003366; margin-bottom:10px; }
    .subtitle { text-align:center; color:#666; margin-bottom:30px; }
    .report-info { display:grid; gap:15px; }
    .info-row { background:#fff; padding:16px; border-radius:12px; border-left:5px solid #0d6efd; font-size:20px; }
    .info-row strong { color:#003366; }
    .status-new { background:#FFF3CD; color:#B45309; padding:8px 15px; border-radius:20px; font-weight:bold; }
    .status-progress { background:#DBEAFE; color:#1D4ED8; padding:8px 15px; border-radius:20px; font-weight:bold; }
    .status-resolved { background:#DCFCE7; color:#166534; padding:8px 15px; border-radius:20px; font-weight:bold; }
    .timeline { display:flex; justify-content:space-between; margin-top:40px; gap:20px; }
    .step { flex:1; text-align:center; }
    .circle { width:55px; height:55px; border-radius:50%; line-height:55px; margin:auto; margin-bottom:10px; color:white; font-weight:bold; }
    .completed .circle { background:#22c55e; }
    .pending .circle { background:#cbd5e1; color:#555; }
    .completed { color:#16a34a; font-weight:bold; }
    .pending { color:#888; }
    .loading { text-align:center; font-size:22px; }
    .back-link { display:inline-block; margin-top:24px; color:#003366; font-weight:700; text-decoration:none; }
    @media(max-width:768px) { .timeline{ flex-direction:column; } .info-row{ font-size:17px; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Suivi du signalement</h1>
      <p class="subtitle">Wilaya de Skikda - Plateforme de suivi électronique</p>
      <div id="result" class="loading">Chargement des données du signalement...</div>
      <a class="back-link" href="index.html">← Retour à la page française</a>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://xhgjmqyjbtnbdxvronhs.supabase.co";
    const SUPABASE_KEY = "sb_publishable_QBNv1eSIBsuzfu5j_eaRVA_UC3vF6KH";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const params = new URLSearchParams(window.location.search);
    const reportId = params.get("reportId");

    async function loadReport() {
      if (!reportId) {
        document.getElementById("result").innerHTML = "<div class='info-row'>Numéro de signalement manquant.</div>";
        return;
      }

      const { data, error } = await supabaseClient
        .from("reports")
        .select("*")
        .eq("report_id", reportId)
        .single();

      if (error || !data) {
        document.getElementById("result").innerHTML = "<div class='info-row'>Signalement introuvable.</div>";
        return;
      }

      let statusClass = "status-new";
      let statusText = "Nouveau";
      if (data.status === "inprogress") {
        statusClass = "status-progress";
        statusText = "En cours";
      }
      if (data.status === "resolved") {
        statusClass = "status-resolved";
        statusText = "Résolu";
      }

      const step2 = (data.status === "inprogress" || data.status === "resolved") ? "completed" : "pending";
      const step3 = data.status === "resolved" ? "completed" : "pending";
      const createdAt = data.created_at ? new Date(data.created_at).toLocaleDateString('fr-FR') : 'Non disponible';

      document.getElementById("result").innerHTML = `
        <div class="report-info">
          <div class="info-row"><strong>Numéro du signalement :</strong> ${data.report_id}</div>
          <div class="info-row"><strong>Type de problème :</strong> ${data.issue_type}</div>
          <div class="info-row"><strong>Localisation :</strong> ${data.location}</div>
          <div class="info-row"><strong>Description :</strong> ${data.description}</div>
          <div class="info-row"><strong>Statut :</strong> <span class="${statusClass}">${statusText}</span></div>
          <div class="info-row"><strong>Date :</strong> ${createdAt}</div>
        </div>
        <div class="timeline">
          <div class="step completed"><div class="circle">1</div>Signalement reçu</div>
          <div class="step ${step2}"><div class="circle">2</div>En cours de traitement</div>
          <div class="step ${step3}"><div class="circle">3</div>Résolu</div>
        </div>
      `;
    }
    loadReport();
  </script>
</body>
</html>
